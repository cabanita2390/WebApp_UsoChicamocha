name: CI/CD Frontend

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────────────────────
  # CI: corre en TODAS las ramas y en PRs hacia main
  # ──────────────────────────────────────────────────────────────
  test:
    name: Tests (Vitest)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Ejecutar tests unitarios
        run: npm test -- --run

  # ──────────────────────────────────────────────────────────────
  # CD: solo cuando se hace push a test → despliega a TEST/QA
  # ──────────────────────────────────────────────────────────────
  deploy-test:
    name: Build & Deploy (TEST)
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/test' && github.event_name == 'push'

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Configurar Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Instalar dependencias
        run: npm ci

      - name: Construir build de TEST
        run: npm run build:test

      - name: Diagnóstico — confirmar que los secretos no están vacíos (sin exponer valores)
        env:
          H: ${{ secrets.SSH_HOST }}
          U: ${{ secrets.SSH_USER }}
          K: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          [ -z "$H" ] && echo "SSH_HOST: VACÍO" || echo "SSH_HOST: OK (longitud ${#H})"
          [ -z "$U" ] && echo "SSH_USER: VACÍO" || echo "SSH_USER: OK (longitud ${#U})"
          [ -z "$K" ] && echo "SSH_PRIVATE_KEY: VACÍO" || echo "SSH_PRIVATE_KEY: OK (longitud ${#K})"

      - name: Limpiar carpeta destino en el VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: rm -rf /var/www/test-admin-uso/*

      - name: Copiar build al VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: "dist/*"
          target: "/var/www/test-admin-uso"
          strip_components: 1
